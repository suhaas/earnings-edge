repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
        
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [--strict]
        
      - id: gitleaks
        name: detect-secrets (gitleaks)
        entry: gitleaks detect --verbose --redact
        language: system
        stages: [commit]
