name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: make lint

  prompt-checks:
    # Deterministic prompt-linter: registry <-> prompts <-> agent roles stay in sync,
    # every prompt renders, and no prompt body drifts from its agent. Fast, no services.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - name: Prompt registry + loader consistency
        run: uv run pytest tests/unit/test_prompt_registry.py tests/unit/test_prompt_loader.py -q

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_earnings_edge
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: make test

  eval-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Allow the github-script step to post a PR comment (default token is read-only).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make eval
      - name: Comment eval results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('eval-results.json')) {
              core.info('No eval-results.json produced; skipping comment.');
              return;
            }
            const results = JSON.parse(fs.readFileSync('eval-results.json', 'utf8'));
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Eval Results\n\n\`\`\`json\n${JSON.stringify(results, null, 2)}\n\`\`\``
            });
